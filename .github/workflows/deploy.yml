name: Deploy to production

# SECURITY NOTE: this repo uses a self-hosted runner on a homelab server.
# Only trigger on push to main (i.e. after a merge). NEVER add pull_request
# as a trigger — that would allow arbitrary code execution on the server
# from any external contributor's PR.
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C ~/rez.ai pull

      - name: Rebuild and restart
        run: docker compose -f ~/rez.ai/docker-compose.yml up -d --build
