<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rez.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="site-header">
    <a href="/" id="logo" onclick="navigate('explore'); return false;">rez.ai</a>
    <nav id="main-nav">
      <a href="/" id="nav-explore" class="nav-link active" onclick="navigate('explore'); return false;">Explore</a>
      <a href="/cookbook" id="nav-cookbook" class="nav-link" onclick="navigate('cookbook'); return false;">My Cookbook</a>
    </nav>
    <div id="auth-area">
      <button id="auth-btn" onclick="openAuthModal()">Sign in</button>
      <div id="user-menu" hidden>
        <span id="user-email"></span>
        <button id="sign-out-btn" onclick="signOut()">Sign out</button>
      </div>
    </div>
  </header>

  <!-- Auth modal -->
  <div id="auth-modal" hidden>
    <div id="auth-modal-inner">
      <button class="modal-close" onclick="closeAuthModal()">✕</button>
      <h2 class="modal-title">Welcome to rez.ai</h2>

      <div id="auth-providers">
        <button class="provider-btn" onclick="signInWith('google')">Continue with Google</button>
      </div>

      <div class="auth-divider"><span>or</span></div>

      <form id="email-auth-form" onsubmit="handleEmailAuth(event)">
        <input id="auth-email" type="email" placeholder="Email" required autocomplete="email" />
        <input id="auth-password" type="password" placeholder="Password" required autocomplete="current-password" />
        <div id="auth-error" hidden></div>
        <button type="submit" id="auth-submit">Sign in</button>
      </form>

      <p class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <a href="#" id="auth-toggle-link" onclick="toggleAuthMode(event)">Sign up</a>
      </p>
    </div>
  </div>
  <div id="auth-modal-backdrop" hidden onclick="closeAuthModal()"></div>

  <main id="main">
    <!-- Search results -->
    <section id="results-section" hidden>
      <form id="search-form" onsubmit="handleSearch(event)">
        <input
          id="search-input"
          type="search"
          placeholder="Search recipes…"
          autocomplete="off"
          spellcheck="false"
        />
        <button type="submit">Search</button>
      </form>
      <h2 id="results-heading"></h2>
      <div id="results-grid"></div>
    </section>

    <!-- Recipe detail -->
    <article id="recipe-section" hidden></article>

    <!-- My Cookbook -->
    <section id="cookbook-section" hidden>
      <h2 id="cookbook-heading">My Cookbook</h2>
      <div id="cookbook-grid"></div>
    </section>
  </main>

  <div id="toast" hidden></div>
  <span id="version-label"></span>
  <footer id="site-footer">© 2025 FrontSide</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil" crossorigin="anonymous"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
